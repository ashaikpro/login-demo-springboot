spring.application.name=demo

# JWT configuration - change jwt.secret to a strong random value (min 32 characters). Do NOT commit a production secret into VCS.
jwt.secret=ChangeThisSecretToAStrongRandomValueAtLeast32CharsLong
# token expiration in minutes
jwt.expiration-minutes=15

# Local PostgreSQL datasource (development only). Credentials provided as requested.
# Replace or externalize these values for production (use environment variables / vault).
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=ahmed
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate defaults for local development
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

